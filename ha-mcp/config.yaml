---
name: "HA-MCP"
description: "MCP Orchestrator — dynamic AI tool discovery and pipeline for Home Assistant"
version: "2.0.0"
slug: "ha-mcp"
url: "https://github.com/alexisdeudon01/HA-MCP"

arch:
  - aarch64
  - amd64
  - armv7

homeassistant: "2025.1.0"
init: false
startup: "application"
boot: "auto"
timeout: 300

map:
  - share:rw
  - media:ro
  - addon_config:rw

# Accès via ingress HA uniquement (pas de port externe)
# L'ingress proxifie le trafic sans exposer de port sur le host
ingress: true
ingress_port: 8099
panel_icon: "mdi:robot-outline"
panel_title: "HA-MCP"

options:
  log_level: "info"
  storage_path: "/share/ha-mcp"
  anthropic_api_key: ""
  openai_api_key: ""
  mistral_api_key: ""
  hf_api_key: ""
  auto_discover_mcps: true
  mcp_discovery_depth: 2

schema:
  log_level: "list(debug|info|warning|error)"
  storage_path: "str"
  anthropic_api_key: "str?"
  openai_api_key: "str?"
  mistral_api_key: "str?"
  hf_api_key: "str?"
  auto_discover_mcps: "bool"
  mcp_discovery_depth: "int(1,5)"
